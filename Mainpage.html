<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NATRAILS | MAIN SYSTEM</title>
    <style>
        :root {
            --neon-green: #00ff00;
            --alert-red: #ff3e3e;
            --bg-dark: #050505;
            --translucent: rgba(0, 255, 0, 0.05);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark);
            color: var(--neon-green);
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        /* --- LOGIN OVERLAY --- */
        #login-overlay {
            position: fixed;
            inset: 0;
            background: black;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 3000;
        }

        .login-box {
            border: 1px solid var(--neon-green);
            padding: 40px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
        }

        input {
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--neon-green);
            color: var(--neon-green);
            font-family: inherit;
            font-size: 20px;
            text-align: center;
            outline: none;
            margin-top: 20px;
        }

        /* --- WARNING OVERLAY --- */
        #warning-screen {
            position: fixed;
            inset: 0;
            background: #7a0000;
            color: white;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            text-align: center;
            animation: flicker 0.1s infinite;
        }

        @keyframes flicker {
            0% { opacity: 1; } 50% { opacity: 0.8; } 100% { opacity: 1; }
        }

        .fade-out {
            transition: opacity 1.5s ease-out;
            opacity: 0 !important;
        }

        /* --- MAIN DASHBOARD --- */
        #main-content {
            display: none;
            height: 100vh;
            padding: 40px;
            box-sizing: border-box;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            background: radial-gradient(circle, rgba(0,255,0,0.05) 0%, rgba(0,0,0,1) 100%);
        }

        .left-panel {
            border: 1px solid rgba(0, 255, 0, 0.3);
            background: var(--translucent);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .left-panel::before {
            content: "SCANNING_ENVIRONMENT...";
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 10px;
            opacity: 0.5;
        }

        .right-panel {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 20px;
        }

        /* --- BUTTONS --- */
        .nav-btn {
            background: transparent;
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            padding: 20px;
            font-size: 18px;
            font-family: inherit;
            text-transform: uppercase;
            letter-spacing: 4px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
            position: relative;
            text-decoration: none;
        }

        .nav-btn:hover {
            background: var(--neon-green);
            color: black;
            box-shadow: 0 0 20px var(--neon-green);
            padding-left: 40px;
        }

        .nav-btn::after {
            content: " >";
            position: absolute;
            right: 20px;
        }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h3>NATRAILS CENTRAL TERMINAL</h3>
            <p>ENTER SYSTEM PASSCODE</p>
            <input type="password" id="pass-input" autofocus>
        </div>
    </div>

    <div id="warning-screen">
        <h1 style="font-size: 50px;">⚠️ WARNING ⚠️</h1>
        <p>RESTRICTED DATA ACCESS DETECTED</p>
        <p>LOCAL AUTHORITIES HAVE BEEN NOTIFIED</p>
        <p style="margin-top: 20px; font-size: 12px;">ENCRYPTING BACKDOOR...</p>
    </div>

    <div id="main-content">
        <div class="left-panel">
            <div style="border: 1px dashed rgba(0,255,0,0.2); width: 80%; height: 80%;"></div>
        </div>

        <div class="right-panel">
            <a href="database.html" class="nav-btn">Files</a>
            <a href="About.html" class="nav-btn">About</a>
            <a href="ID.html" class="nav-btn">ID Card</a>
        </div>
    </div>

    <script>
        const passInput = document.getElementById('pass-input');
        const loginOverlay = document.getElementById('login-overlay');
        const warningScreen = document.getElementById('warning-screen');
        const mainContent = document.getElementById('main-content');

        passInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                // You can change "NATRAILS" to whatever main passcode you want
                if (this.value.toUpperCase() === "NATRAILS") {
                    startSequence();
                } else {
                    alert("ACCESS DENIED");
                    this.value = "";
                }
            }
        });

        function startSequence() {
            // Hide Login
            loginOverlay.style.display = 'none';
            
            // Show Warning
            warningScreen.style.display = 'flex';
            
            // Wait 2 seconds, then fade out warning and show home
            setTimeout(() => {
                warningScreen.classList.add('fade-out');
                
                setTimeout(() => {
                    warningScreen.style.display = 'none';
                    mainContent.style.display = 'grid';
                }, 1500);
            }, 2000);
        }
    </script>

</body>
</html>
