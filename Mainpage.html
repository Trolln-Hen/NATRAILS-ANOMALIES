<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NATRAILS | MAIN SYSTEM</title>
    <style>
        :root {
            --neon: #00ff00;
            --bg: #050505;
            --translucent: rgba(0, 255, 0, 0.05);
            --panel-border: rgba(0, 255, 0, 0.2);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg);
            color: var(--neon);
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        /* --- WARNING PAGE --- */
        #warning-page {
            position: fixed;
            inset: 0;
            background: #600000;
            color: white;
            display: none; /* Controlled by JS */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            text-align: center;
            transition: opacity 1s ease-out;
        }

        .warning-text {
            font-size: 40px;
            font-weight: bold;
            animation: blink 0.5s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; }
        }

        /* --- MAIN HOME PAGE --- */
        #home-page {
            display: none;
            height: 100vh;
            width: 100vw;
            background: radial-gradient(circle, rgba(0,255,0,0.05) 0%, rgba(0,0,0,1) 100%);
            padding: 40px;
            box-sizing: border-box;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 40px;
            opacity: 0;
            transition: opacity 1s ease-in;
        }

        /* --- TOP RIGHT BRANDING --- */
        .branding {
            position: absolute;
            top: 30px;
            right: 40px;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 500;
        }

        .branding img {
            width: 50px;
            height: auto;
            filter: brightness(0) invert(1) drop-shadow(0 0 8px var(--neon));
        }

        .branding-text {
            text-align: right;
            line-height: 1;
        }

        .branding-text h2 {
            margin: 0;
            font-size: 18px;
            letter-spacing: 3px;
        }

        .branding-text span {
            font-size: 10px;
            opacity: 0.7;
        }

        /* --- PANELS & BUTTONS --- */
        .left-panel {
            border: 1px solid var(--panel-border);
            background: var(--translucent);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            box-shadow: inset 0 0 30px rgba(0, 255, 0, 0.05);
        }

        .internal-box {
            width: 85%;
            height: 85%;
            border: 1px dashed rgba(0, 255, 0, 0.2);
        }

    .right-panel {
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 25px;
    z-index: 10; /* Ensures it stays above the background */
}

        .nav-btn {
            background: rgba(0, 255, 0, 0.02);
            border: 1px solid var(--panel-border);
            color: var(--neon);
            padding: 25px;
            font-size: 20px;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .nav-btn:hover {
            background: var(--neon);
            color: black;
            box-shadow: 0 0 30px var(--neon);
            transform: translateX(10px);
        }

        /* --- PUZZLE BOARD STYLING --- */
#puzzle-board {
    display: grid;
    grid-template-columns: repeat(4, 1fr); 
    grid-template-rows: repeat(4, 1fr);
    gap: 0; 
    width: 100%;
    aspect-ratio: 1 / 1;
    border: 2px solid var(--panel-border);
    background-color: #000;
}

.placed-piece {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
}

@keyframes pieceAppear {
    from { opacity: 0; transform: scale(2) rotate(15deg); }
    to { opacity: 1; transform: scale(1) rotate(0deg); }
}
    </style>
</head>
<body>

    <div id="warning-page">
        <div class="warning-text">⚠️ SECURITY BREACH DETECTED ⚠️</div>
        <p style="margin-top: 20px; letter-spacing: 2px;">BYPASSING FIREWALL...</p>
    </div>

    <div class="branding">
        <div class="branding-text">
            <h2>NATRAILS</h2>
            <span>ANOMALIES_TERMINAL_V.2</span>
        </div>
        <img src="NATRAILS-LOGO.png" alt="LOGO">
    </div>

<div id="home-page" style="display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 40px; opacity: 1;">
    
    <div class="left-panel">
        <div class="internal-box" id="puzzle-board">
            </div>
    </div>

    <div class="right-panel">
        <a href="database.html" class="nav-btn">Files</a>
        <a href="about.html" class="nav-btn">About</a>
        <a href="ID.html" class="nav-btn">ID Card</a>
    </div>

</div>
    
<script>
window.onload = () => {
    const board = document.getElementById('puzzle-board');
    const warning = document.getElementById('warning-page');
    const home = document.getElementById('home-page');

    // 1. PIECE LOADING LOGIC
    // Normal pieces 1-12
    for (let i = 1; i <= 12; i++) {
        if (localStorage.getItem(`fragment_${i}_collected`) === 'true') {
            const img = document.createElement('img');
            img.src = `piece${i}.png`;
            img.className = 'placed-piece';
            
            let col = ((i - 1) % 4) + 1;
            let row = Math.floor((i - 1) / 4) + 1;
            
            img.style.gridColumn = col;
            img.style.gridRow = row;
            board.appendChild(img);
        }
    }

    // Double-wide Piece 13
    if (localStorage.getItem('fragment_13_collected') === 'true') {
        const img13 = document.createElement('img');
        img13.src = 'piece13.png';
        img13.className = 'placed-piece';
        img13.style.gridRow = "4";
        img13.style.gridColumn = "1 / span 2";
        board.appendChild(img13);
    }

    // Double-wide Piece 14
    if (localStorage.getItem('fragment_14_collected') === 'true') {
        const img14 = document.createElement('img');
        img14.src = 'piece14.png';
        img14.className = 'placed-piece';
        img14.style.gridRow = "4";
        img14.style.gridColumn = "3 / span 2";
        board.appendChild(img14);
    }

    // 2. TRANSITION LOGIC
    if (sessionStorage.getItem('warning_bypassed')) {
        home.style.display = 'grid';
        setTimeout(() => { home.style.opacity = '1'; }, 50);
    } else {
        warning.style.display = 'flex';
        setTimeout(() => {
            warning.style.opacity = '0';
            home.style.display = 'grid';
            sessionStorage.setItem('warning_bypassed', 'true');
            setTimeout(() => {
                warning.style.display = 'none';
                home.style.opacity = '1';
            }, 1000);
        }, 2500);
    }
};
</script>
</body>
</html>
