<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NATRAILS ANOMALIES | System Boot</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* LOADING SCREEN */
        #loading-screen {
            position: fixed;
            width: 100%;
            height: 100vh;
            background: black;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .logo-img {
            width: 220px;
            height: auto;
            filter: drop-shadow(0 0 15px #00ff00);
            animation: pulse 2s infinite;
            margin-bottom: 20px;
        }

        .loader-container {
            width: 300px;
            border: 1px solid #00ff00;
            padding: 3px;
            margin-top: 20px;
        }

        .loader-bar {
            height: 15px;
            background: #00ff00;
            width: 0%; 
            box-shadow: 0 0 10px #00ff00;
        }

        #status-text {
            margin-top: 15px;
            font-size: 0.9rem;
            letter-spacing: 2px;
        }

        /* SECURITY BOX */
        #home-page {
            display: none;
            text-align: center;
            border: 1px solid #00ff00;
            padding: 40px;
            box-shadow: 0 0 20px #004400;
        }

        input {
            background: #000;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 10px;
            font-family: monospace;
            text-align: center;
            margin-bottom: 15px;
            outline: none;
        }

        button {
            background: #00ff00;
            color: #000;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            font-family: monospace;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.02); }
        }
    </style>
</head>

        <p id="counter" style="color: #00ff00; font-size: 0.8rem;"></p>
