<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NATRAILS ANOMALIES | System Boot</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* LOADING SCREEN */
        #loading-screen {
            position: fixed;
            width: 100%;
            height: 100vh;
            background: black;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .logo-img {
            width: 200px;
            height: auto;
            filter: drop-shadow(0 0 10px #00ff00);
            animation: pulse 2s infinite;
        }

        /* SECURITY BOX */
        #home-page {
            display: none; /* Hidden until loader finishes */
            text-align: center;
            border: 1px solid #00ff00;
            padding: 40px;
            box-shadow: 0 0 20px #004400;
        }

        input {
            background: #000;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 10px;
            font-family: monospace;
            text-align: center;
            margin-bottom: 10px;
            outline: none;
        }

        button {
            background: #00ff00;
            color: #000;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            font-family: monospace;
        }

        button:hover { background: #008800; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <img src="Atrails anomalies.png" alt="Logo" class="logo-img">
        <p>INITIALIZING SECURITY PROTOCOLS...</p>
    </div>

    <div id="home-page">
        <h1 style="text-shadow: 0 0 10px #00ff00;">RESTRICTED ACCESS</h1>
        <p>ENTER ENCRYPTION KEY:</p>
        
        <input type="password" id="passkey-input" placeholder="********"><br>
        <button onclick="checkPasskey()">VERIFY IDENTITY</button>

        <p id="message" style="color: #ff0000; margin-top: 15px; font-weight: bold;"></p>
        <p id="counter" style="color: #00ff00; font-size: 0.8rem;"></p>
    </div>

    <script>
        // Switch from loader to login after 3 seconds
        setTimeout(() => {
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('home-page').style.display = 'block';
        }, 3000);

        let attempts = 0;
        const maxAttempts = 5;

        function checkPasskey() {
            const val = document.getElementById('passkey-input').value;
            const msg = document.getElementById('message');
            const count = document.getElementById('counter');

            if (val === "Triangle") {
                window.location.href = "database.html"; 
            } else {
                attempts++;
                msg.innerText = "ACCESS DENIED";
                
                if (attempts >= 2) {
                    let left = maxAttempts - attempts;
                    count.innerText = left + " TRIES REMAINING";
                }

                if (attempts >= maxAttempts) {
                    document.body.innerHTML = "<h1 style='color:red; text-align:center; margin-top:20%;'>SYSTEM LOCKED: UNAUTHORIZED USER</h1>";
                }
            }
        }
    </script>
</body>
</html>
