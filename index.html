<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NATRAILS ANOMALIES | System Boot</title>
    <style>
        /* General Styles */
        body {
            background-color: #0a0a0a;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            overflow: hidden; /* Prevents scrolling during loading */
        }

        /* 1. LOADING SCREEN STYLES */
        #loading-screen {
            position: fixed;
            width: 100%;
            height: 100vh;
            background: black;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .logo {
            font-size: 3rem;
            font-weight: bold;
            text-shadow: 0 0 10px #00ff00;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }

        .loader-bar {
            width: 200px;
            height: 4px;
            background: #111;
            border: 1px solid #00ff00;
            position: relative;
        }

        .loader-progress {
            position: absolute;
            height: 100%;
            background: #00ff00;
            width: 0%;
            animation: fill 3s forwards;
        }

        /* 2. HOME PAGE STYLES (Hidden at first) */
        #home-page {
            display: none; /* We will show this with JS */
            padding: 50px;
            text-align: center;
        }

        /* Animations */
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }
        @keyframes fill {
            0% { width: 0%; }
            100% { width: 100%; }
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="logo">[ Δ ]</div>
        <div>INITIALIZING SYSTEM...</div>
        <div class="loader-bar">
            <div class="loader-progress"></div>
        </div>
    </div>

    <div id="home-page">
        <h1>ACCESS GRANTED</h1>
        <p>Welcome to the NATRAILS ANOMALIES database.</p>
        <hr style="border-color: #00ff00; width: 50%;">
        <p>Current Sector: [CLASSIFIED]</p>
    </div>

    <script>
        // After 3.5 seconds, hide the loader and show the home page
        setTimeout(() => {
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('home-page').style.display = 'block';
            document.body.style.overflow = 'auto'; // Allow scrolling again
        }, 3500);
    </script>

</body>
</html>
