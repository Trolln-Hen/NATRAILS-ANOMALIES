<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NATRAILS | LOGIN</title>
    <style>
        body { background-color: #050505; color: #00ff00; font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-container { border: 1px solid #00ff00; padding: 40px; text-align: center; box-shadow: 0 0 20px rgba(0, 255, 0, 0.2); }
        input { background: transparent; border: none; border-bottom: 2px solid #00ff00; color: #00ff00; font-family: inherit; font-size: 20px; text-align: center; outline: none; margin-top: 20px; width: 100%; }
        #message { margin-top: 20px; color: #ff3e3e; height: 20px; }
        #hint { margin-top: 10px; color: #e3b341; font-size: 12px; display: none; }
        #counter { font-size: 12px; margin-top: 10px; opacity: 0.7; }
    </style>
</head>
<body>

    <div class="login-container">
        <h3>SYSTEM ACCESS</h3>
        <p>ENTER ENCRYPTION KEY</p>
        <input type="password" id="pass-input" autofocus>
        <div id="message"></div>
        <div id="hint">HINT: Check the filenames... LOGOS</div>
        <div id="counter">5 TRIES LEFT</div>
    </div>

    <script>
        let fails = 0;
        const LOCKOUT_TIME = 30000; // 30 seconds for testing

        document.getElementById('pass-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                const val = this.value.toUpperCase();
                
                // --- SUCCESS LOGIC ---
                if (val === "NATRAILS") {
                    window.location.href = "Mainpage.html";
                } 
                // --- FAILURE LOGIC ---
                else {
                    fails++;
                    this.value = "";
                    document.getElementById('message').innerText = "ACCESS DENIED";
                    document.getElementById('counter').innerText = (5 - fails) + " TRIES LEFT";

                    // HINT ON 3RD ATTEMPT
                    if (fails === 3) {
                        document.getElementById('hint').style.display = 'block';
                    }

                    // LOCKOUT ON 5TH ATTEMPT
                    if (fails >= 5) {
                        const end = Date.now() + LOCKOUT_TIME;
                        localStorage.setItem('lockout_expiry', end);
                        startLockoutTimer(end);
                    }
                }
            }
        });

        function startLockoutTimer(expiry) {
            const input = document.getElementById('pass-input');
            const msg = document.getElementById('message');
            input.disabled = true;

            const timer = setInterval(() => {
                const left = expiry - Date.now();
                if (left <= 0) {
                    clearInterval(timer);
                    localStorage.removeItem('lockout_expiry');
                    location.reload();
                } else {
                    msg.innerText = `SYSTEM LOCKED: ${Math.ceil(left / 1000)}s`;
                }
            }, 1000);
        }

        // Check for existing lockout on page load
        window.onload = () => {
            const expiry = localStorage.getItem('lockout_expiry');
            if (expiry && Date.now() < expiry) {
                startLockoutTimer(expiry);
            }
        };
    </script>
</body>
</html>
