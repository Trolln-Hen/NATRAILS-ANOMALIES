<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NATRAILS | SECURE LOGIN</title>
    <style>
        :root {
            --neon: #00ff00;
            --bg: #050505;
            --red: #ff3e3e;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100vh;
            background-color: var(--bg);
            color: var(--neon);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* --- CRT SCANLINE EFFECT --- */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 100;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        /* --- LOADING SCREEN --- */
        #loading-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            z-index: 50;
            transition: opacity 1s ease-out;
        }

        .main-logo {
            width: 150px;
            height: auto;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px var(--neon));
            animation: pulse 2s infinite;
        }

        .loading-bar-container {
            width: 300px;
            height: 4px;
            background: #111;
            margin-top: 20px;
            border-radius: 2px;
            overflow: hidden;
            border: 1px solid rgba(0, 255, 0, 0.3);
        }

        .loading-bar {
            height: 100%;
            width: 0%;
            background: var(--neon);
            box-shadow: 0 0 10px var(--neon);
            transition: width 0.1s linear;
        }

        /* --- LOGIN SCREEN --- */
        #login-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            background: rgba(0, 255, 0, 0.03);
            border: 1px solid rgba(0, 255, 0, 0.3);
            padding: 40px 60px;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.1), inset 0 0 20px rgba(0, 255, 0, 0.05);
            backdrop-filter: blur(5px);
            opacity: 0;
            transition: opacity 1s ease-in;
            text-align: center;
        }

        h2 { margin: 0 0 10px 0; letter-spacing: 2px; }
        
        .input-group {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
        }

        input {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--neon);
            color: var(--neon);
            font-family: inherit;
            font-size: 18px;
            padding: 10px;
            text-align: center;
            outline: none;
            width: 250px;
            transition: box-shadow 0.3s;
        }

        input:focus { box-shadow: 0 0 15px rgba(0, 255, 0, 0.5); }

        .submit-btn {
            background: transparent;
            color: var(--neon);
            border: 1px solid var(--neon);
            padding: 10px 20px;
            font-family: inherit;
            font-size: 16px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s;
            width: 100%;
            max-width: 272px;
        }

        .submit-btn:hover {
            background: var(--neon);
            color: black;
            box-shadow: 0 0 20px var(--neon);
        }

        #message { margin-top: 20px; color: var(--red); height: 20px; font-weight: bold; text-shadow: 0 0 5px var(--red); }
        #hint { margin-top: 15px; color: #e3b341; font-size: 13px; display: none; text-shadow: 0 0 5px #e3b341; }
        
        @keyframes pulse {
            0% { filter: drop-shadow(0 0 5px var(--neon)); }
            50% { filter: drop-shadow(0 0 20px var(--neon)); }
            100% { filter: drop-shadow(0 0 5px var(--neon)); }
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <img src="NATRAILS-LOGO.png" alt="Natrails Logo" class="main-logo">
        <h1 style="margin:0; letter-spacing: 5px;">NATRAILS ANOMALIES</h1>
        <p style="opacity: 0.7; font-size: 12px; margin-top: 5px;">ESTABLISHING SECURE CONNECTION...</p>
        <div class="loading-bar-container">
            <div id="loading-bar" class="loading-bar"></div>
        </div>
    </div>

    <div id="login-screen">
        <img src="NATRAILS-LOGO.png" alt="Logo" style="width: 80px; margin-bottom: 20px;">
        <h2>SYSTEM ACCESS</h2>
        <p style="margin:0; font-size: 12px; opacity: 0.7;">AUTHORIZED PERSONNEL ONLY</p>
        
        <div class="input-group">
            <input type="password" id="pass-input" placeholder="ENTER PASSCODE">
            <button class="submit-btn" id="submit-btn">ENTER PASSCODE</button>
        </div>

        <div id="message"></div>
        <div id="hint">SYSTEM HINT: LOGOS</div>
    </div>

    <script>
        // --- BOOT UP SEQUENCE ---
        window.onload = () => {
            let width = 0;
            const loadingBar = document.getElementById('loading-bar');
            const bootScreen = document.getElementById('loading-screen');
            const loginScreen = document.getElementById('login-screen');
            const inputField = document.getElementById('pass-input');

            let interval = setInterval(() => {
                width += Math.random() * 15;
                if (width >= 100) {
                    width = 100;
                    clearInterval(interval);
                    
                    // Fade out boot, fade in login
                    bootScreen.style.opacity = '0';
                    setTimeout(() => {
                        bootScreen.style.display = 'none';
                        loginScreen.style.display = 'flex';
                        // Trigger reflow for fade in
                        void loginScreen.offsetWidth;
                        loginScreen.style.opacity = '1';
                        inputField.focus();
                    }, 1000);
                }
                loadingBar.style.width = width + '%';
            }, 150);
        };

        // --- LOGIN LOGIC ---
        let fails = 0;
        const passInput = document.getElementById('pass-input');
        const submitBtn = document.getElementById('submit-btn');
        const messageDiv = document.getElementById('message');
        const hintDiv = document.getElementById('hint');

        function attemptLogin() {
            // Case-insensitive check for "Triangle"
            if (passInput.value.toLowerCase() === "triangle") {
                messageDiv.style.color = "#00ff00";
                messageDiv.innerText = "ACCESS GRANTED. REROUTING...";
                setTimeout(() => {
                    window.location.href = "Mainpage.html";
                }, 1000);
            } else {
                fails++;
                passInput.value = "";
                messageDiv.style.color = "#ff3e3e";
                messageDiv.innerText = `ACCESS DENIED (${fails}/5)`;

                if (fails === 3) {
                    hintDiv.style.display = 'block';
                }
                if (fails >= 5) {
                    messageDiv.innerText = "SYSTEM LOCKED. REFRESH TO REBOOT.";
                    passInput.disabled = true;
                    submitBtn.disabled = true;
                }
            }
        }

        // Trigger on Button Click
        submitBtn.addEventListener('click', attemptLogin);

        // Trigger on Enter Key
        passInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                attemptLogin();
            }
        });
    </script>

</body>
</html>
