<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NATRAILS ANOMALIES | System Boot</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            overflow: hidden;
        }

        /* LOADING SCREEN */
        #loading-screen {
            position: fixed;
            width: 100%;
            height: 100vh;
            background: black;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        /* CSS for your Logo Image */
        .logo-img {
            width: 200px; /* Adjust size here */
            height: auto;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px #00ff00); /* Gives your logo a neon glow */
            animation: pulse 2s infinite;
        }

        .loader-bar {
            width: 250px;
            height: 4px;
            background: #111;
            border: 1px solid #00ff00;
            position: relative;
            margin-top: 20px;
        }

        .loader-progress {
            position: absolute;
            height: 100%;
            background: #00ff00;
            width: 0%;
            animation: fill 3s forwards;
        }

        /* HOME PAGE */
        #home-page {
            display: none;
            padding: 50px;
            text-align: center;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.05); }
            100% { opacity: 1; transform: scale(1); }
        }
        @keyframes fill {
            0% { width: 0%; }
            100% { width: 100%; }
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <img src="Atrails anomalies.png" alt="Logo" class="logo-img">
        <div style="letter-spacing: 5px;">INITIALIZING SYSTEM...</div>
        <div class="loader-bar">
            <div class="loader-progress"></div>
        </div>
    </div>

    <div id="home-page">
        <h1 style="text-shadow: 0 0 15px #00ff00;">ACCESS GRANTED</h1>
        <p>Welcome to the NATRAILS ANOMALIES database.</p>
        <hr style="border-color: #00ff00; width: 50%;">
        <p>Current Sector: [CLASSIFIED]</p>
        <p style="font-size: 0.8rem; color: #008800;">Waiting for uplink...</p>
    </div>

    <script>
        setTimeout(() => {
            document.getElementById('loading-screen').style.fadeOut = "slow"; // Visual hint
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('home-page').style.display = 'block';
            document.body.style.overflow = 'auto';
        }, 3500);
    </script>

</body>
</html>
