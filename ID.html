<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NATRAILS | STAFF ID</title>
    <style>
        body {
            background-color: #050505;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* --- THE ID CARD --- */
        .id-card {
            width: 500px;
            height: 300px;
            background: rgba(0, 255, 0, 0.03);
            border: 2px solid rgba(0, 255, 0, 0.2);
            border-radius: 10px;
            box-shadow: inset 0 0 30px rgba(0, 255, 0, 0.05), 0 0 15px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Subtle scanline effect across the whole card */
        .id-card::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(0deg, rgba(0,255,0,0.01) 50%, rgba(0,0,0,0) 50%);
            background-size: 100% 4px;
            z-index: 10;
            pointer-events: none;
        }

        /* --- TOP SECTION --- */
        .id-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: rgba(0, 255, 0, 0.05);
            border-bottom: 1px solid rgba(0, 255, 0, 0.2);
        }

        .header-logo {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.7;
        }

        .header-title {
            font-weight: bold;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* --- MIDDLE SECTION --- */
        .id-body {
            flex: 1;
            display: flex;
            padding: 20px;
            gap: 20px;
        }

        /* LEFT PHOTO AREA */
        .id-photo {
            width: 140px;
            height: 180px;
            border: 2px solid rgba(0, 255, 0, 0.2);
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .id-photo::before {
            content: "SCANNING...";
            font-size: 10px;
            opacity: 0.5;
            position: absolute;
            top: 10px;
            left: 10px;
        }

        /* RIGHT DETAILS AREA */
        .id-details {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 15px;
        }

        .detail-item {
            display: flex;
            font-size: 14px;
        }

        .label {
            width: 80px;
            text-transform: uppercase;
            opacity: 0.7;
        }

        .value {
            flex: 1;
            font-weight: bold;
        }

        /* --- GLITCH EFFECT FOR TEXT --- */
        .glitch {
            opacity: 0.9;
            animation: flicker 1s infinite;
        }

        @keyframes flicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 0.9; }
            20%, 24%, 55% { opacity: 0.3; }
        }

        /* --- BACK BUTTON --- */
        .back-btn {
            display: block;
            margin-top: 40px;
            padding: 10px 20px;
            color: #00ff00;
            border: 1px solid #00ff00;
            text-decoration: none;
            transition: all 0.3s;
            text-align: center;
        }

        .back-btn:hover {
            background: #00ff00;
            color: #000;
            box-shadow: 0 0 15px #00ff00;
        }
        #staff-name {
    text-transform: uppercase;
}

.reboot-btn {
    background: transparent;
    border: 1px solid #ff2a2a;
    color: #ff2a2a;
    font-family: 'Courier New', Courier, monospace;
    font-size: 10px;
    padding: 8px 15px;
    cursor: pointer;
    letter-spacing: 2px;
    transition: 0.3s;
    opacity: 0.6;
}

.reboot-btn:hover {
    opacity: 1;
    background: #ff2a2a;
    color: black;
    box-shadow: 0 0 15px #ff2a2a;
}
    </style>
</head>
<body>

<div>
    <div class="id-card">
        <div class="id-header">
            <div class="header-logo">LOGO.PNG // ACCESS: ADMIN</div>
            <div class="header-title">NATRAILS ANOMALIES</div>
        </div>

        <div class="id-body">
            <div class="id-photo">
                <p style="opacity: 0.3; font-size: 12px; text-align: center;">PHOTO.JPG<br>NOT FOUND</p>
            </div>
<div class="info-row">
        <span class="label">NAME:</span>
        <span class="value" id="staff-name">LOADING...</span>
    </div>
    </div>
                <div class="detail-item">
                    <span class="label">Role:</span>
                    <span class="value">Staff Worker</span>
                </div>
                <div class="detail-item">
                    <span class="label">Room:</span>
                    <span class="value glitch">R̶̲̆́̉͋̏͒͌̀̅͠Ö̸̰̲̖͕̦͕̥̝̥́̏̽̈́͑̋͒́̚͜͝O̵̲̫͊̈̂̂̆͌̏̏̈̔͠M̴̺͓̀̈́̔̈̈̋̅̐̿̅̔ ̷͙̹̩̼̃̈͒͋̋͑͒̇́̅̉1</span>
                </div>
            </div>
        </div>
    </div>
    <div style="margin-top: 20px; text-align: center;">
    <button onclick="triggerReboot()" class="reboot-btn">REBOOT SYSTEM?</button>
</div>

<style>
    .reboot-btn {
        background: transparent;
        border: 1px solid #ff2a2a;
        color: #ff2a2a;
        font-family: 'Courier New', Courier, monospace;
        font-size: 10px;
        padding: 5px 10px;
        cursor: pointer;
        letter-spacing: 2px;
        transition: 0.3s;
        opacity: 0.5;
    }
    .reboot-btn:hover {
        opacity: 1;
        background: #ff2a2a;
        color: black;
        box-shadow: 0 0 10px #ff2a2a;
    }
</style>
<script>
    window.onload = () => {
        const nameElement = document.getElementById('staff-name');
        const names = ["Mill", "Sam", "Jesse", "Taylor", "Wren"];

        // Check if a name was already assigned this session
        let assignedName = sessionStorage.getItem('assigned_name');

        if (!assignedName) {
            // Randomly pick a name from the list
            assignedName = names[Math.floor(Math.random() * names.length)];
            sessionStorage.setItem('assigned_name', assignedName);
        }

        nameElement.innerText = assignedName;
    };

    function triggerReboot() {
        let code = prompt("CRITICAL OVERRIDE: ENTER AUTHORIZATION CODE");

        if (code && code.toLowerCase() === "avacado") {
            alert("SYSTEM WIPE INITIALIZED. PURGING ALL FRAGMENTS...");
            
            // Clear everything!
            localStorage.clear();
            sessionStorage.clear();
            
            // Send back to the start
            window.location.href = "index.html";
        } else if (code !== null) {
            alert("ACCESS DENIED.");
        }
    }
</script>

    <a href="Mainpage.html" class="back-btn">< RETURN_TO_SYSTEM</a>
</div>

</body>
</html>
