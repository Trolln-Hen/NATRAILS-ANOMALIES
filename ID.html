<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NATRAILS | STAFF ID</title>
    <style>
        :root { --neon: #00ff00; }
        body {
            background-color: #050505;
            color: var(--neon);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        /* --- BIGGER ID CARD --- */
        .id-card {
            width: 550px; /* Wider to stop congestion */
            height: 320px;
            background: rgba(0, 255, 0, 0.02);
            border: 2px solid rgba(0, 255, 0, 0.2);
            border-radius: 10px;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.5), inset 0 0 15px rgba(0,255,0,0.05);
            display: flex;
            flex-direction: column;
        }

        .id-header {
            padding: 10px 20px;
            border-bottom: 1px solid rgba(0, 255, 0, 0.2);
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            letter-spacing: 1px;
        }

        .id-content {
            display: flex;
            padding: 25px;
            gap: 25px;
            flex: 1;
        }

        .id-photo {
            width: 150px;
            height: 180px;
            border: 1px solid rgba(0, 255, 0, 0.3);
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 9px;
            color: rgba(0, 255, 0, 0.3);
        }

        .id-details {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 18px;
        }

        .detail-item { display: flex; align-items: baseline; }
        .label { width: 70px; font-size: 11px; opacity: 0.6; }
        .value { font-size: 18px; font-weight: bold; text-transform: uppercase; }

        /* --- BUTTONS OUTSIDE CARD --- */
        .external-controls {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .reboot-btn {
            background: transparent;
            border: 1px solid #ff2a2a;
            color: #ff2a2a;
            font-family: inherit;
            padding: 10px 20px;
            cursor: pointer;
            letter-spacing: 2px;
            transition: 0.3s;
        }
        .reboot-btn:hover {
            background: #ff2a2a;
            color: black;
            box-shadow: 0 0 15px #ff2a2a;
        }

        .back-btn {
            color: var(--neon);
            text-decoration: none;
            font-size: 12px;
            opacity: 0.5;
            transition: 0.3s;
        }
        .back-btn:hover { opacity: 1; text-decoration: underline; }

        #room-obfuscated { text-shadow: 0 0 5px var(--neon); }
    </style>
</head>
<body>

    <div class="id-card">
        <div class="id-header">
            <span>LOGO.PNG // ACCESS: ADMIN</span>
            <span>NATRAILS ANOMALIES</span>
        </div>
        
        <div class="id-content">
            <div class="id-photo">
                <div style="margin-bottom: 10px;">PHOTO.JPG</div>
                <div>NOT FOUND</div>
            </div>
            
            <div class="id-details">
                <div class="detail-item">
                    <span class="label">NAME:</span>
                    <span class="value" id="staff-name">LOADING...</span>
                </div>
                <div class="detail-item">
                    <span class="label">ROLE:</span>
                    <span class="value">Staff Worker</span>
                </div>
                <div class="detail-item">
                    <span class="label">ROOM:</span>
                    <span class="value">ROOM-<span id="room-obfuscated">67</span></span>
                </div>
            </div>
        </div>
    </div>

    <div class="external-controls">
        <button onclick="triggerReboot()" class="reboot-btn">REBOOT SYSTEM?</button>
        <a href="Mainpage.html" class="back-btn">< RETURN_TO_SYSTEM</a>
    </div>

    <script>
        // 1. Initialize Names and Glitch
        window.onload = () => {
            const nameElement = document.getElementById('staff-name');
            const names = ["Mill", "Sam", "Jesse", "Taylor", "Wren"];

            let assignedName = sessionStorage.getItem('assigned_name');
            if (!assignedName) {
                assignedName = names[Math.floor(Math.random() * names.length)];
                sessionStorage.setItem('assigned_name', assignedName);
            }
            nameElement.innerText = assignedName;

            // Start room obfuscation
            const roomEl = document.getElementById('room-obfuscated');
            const chars = '0123456789!@#$%';
            setInterval(() => {
                let scrambled = '';
                for (let i = 0; i < 2; i++) {
                    scrambled += chars.charAt(Math.floor(Math.random() * chars.length));
                }
                roomEl.innerText = scrambled;
            }, 50);
        };

        // 2. Reboot Logic
        function triggerReboot() {
            let code = prompt("CRITICAL OVERRIDE: ENTER AUTHORIZATION CODE");
            if (code && code.toLowerCase() === "avacado") {
                alert("SYSTEM WIPE INITIALIZED. PURGING DATA...");
                localStorage.clear();
                sessionStorage.clear();
                window.location.href = "index.html";
            } else if (code !== null) {
                alert("ACCESS DENIED.");
            }
        }
    </script>
</body>
</html>
