<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NATRAILS | DATABASE</title>
    <style>
        :root {
            --neon: #00ff00;
            --bg: #020202;
            --translucent: rgba(0, 255, 0, 0.03);
            --panel-border: rgba(0, 255, 0, 0.15);
        }

        body {
            background-color: var(--bg);
            background: radial-gradient(circle at center, #080808 0%, #000 100%);
            color: var(--neon);
            font-family: 'Courier New', Courier, monospace;
            margin: 0; padding: 40px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow-x: hidden;
        }

        .branding {
            position: absolute; top: 30px; right: 40px;
            display: flex; align-items: center; gap: 15px;
        }
        .branding img { width: 40px; filter: brightness(0) invert(1) drop-shadow(0 0 8px var(--neon)); }
        .branding-text { text-align: right; line-height: 1; }
        .branding-text h2 { margin: 0; font-size: 14px; letter-spacing: 2px; }

        .header-section {
            width: 100%; max-width: 1000px;
            border-bottom: 1px solid var(--panel-border);
            margin-bottom: 40px; padding-bottom: 20px;
        }
        .header-section h1 { font-size: 32px; letter-spacing: 8px; margin: 0; }
        .description { font-size: 11px; opacity: 0.5; margin-top: 10px; }

        .database-container {
            width: 100%; max-width: 1000px;
            background: var(--translucent);
            border: 1px solid var(--panel-border);
            backdrop-filter: blur(15px);
            padding: 40px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 25px;
            box-shadow: inset 0 0 50px rgba(0, 0, 0, 1);
        }

        .file-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: 0.3s; padding: 15px; }
        .file-item:hover { background: rgba(0, 255, 0, 0.05); }

        .file-icon {
            width: 65px; margin-bottom: 10px;
            filter: sepia(1) hue-rotate(190deg) saturate(3) brightness(0.3);
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .file-item.opened .file-icon { filter: drop-shadow(0 0 12px var(--neon)) brightness(1.2); }
        .file-name { font-size: 10px; text-align: center; letter-spacing: 1px; }

        .back-btn {
            margin-top: 50px; padding: 12px 35px;
            color: var(--neon); border: 1px solid var(--neon);
            text-decoration: none; text-transform: uppercase;
            letter-spacing: 3px; font-size: 13px; transition: 0.3s;
        }
        .back-btn:hover { background: var(--neon); color: black; box-shadow: 0 0 20px var(--neon); }

        /* --- OVERLAYS --- */
        #loading-screen, #passcode-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.98);
            z-index: 3000; display: none; flex-direction: column;
            justify-content: center; align-items: center;
        }

        input {
            background: transparent; border: none; border-bottom: 2px solid var(--neon);
            color: var(--neon); font-family: inherit; font-size: 24px;
            text-align: center; outline: none; margin-top: 20px; letter-spacing: 5px;
        }

        .progress-bar { width: 350px; height: 1px; background: #111; margin-top: 20px; }
        .progress-fill { width: 0%; height: 100%; background: var(--neon); box-shadow: 0 0 10px var(--neon); }
    </style>
</head>
<body>

    <div class="branding">
        <div class="branding-text">
            <h2>NATRAILS</h2>
            <span style="font-size: 8px; opacity: 0.4;">STORAGE_UNIT_B</span>
        </div>
        <img src="NATRAILS-LOGO.png" alt="LOGO">
    </div>

    <div class="header-section">
        <h1>ENTITY FILES</h1>
        <p class="description">AUTHORIZED PERSONNEL ONLY. PASSCODE REQUIRED FOR RESTRICTED ENTITIES.</p>
    </div>

    <div class="database-container" id="file-grid"></div>

    <a href="Mainpage.html" class="back-btn">< RETURN_TO_SYSTEM</a>

    <div id="passcode-overlay">
        <h2 style="letter-spacing: 5px;">RESTRICTED ACCESS</h2>
        <p style="font-size: 12px; opacity: 0.7;">ENTER FILE KEY</p>
        <input type="password" id="file-pass">
        <p id="pass-msg" style="color: #ff3e3e; margin-top: 10px; font-size: 12px;"></p>
    </div>

    <div id="loading-screen">
        <h2 id="loading-title" style="letter-spacing: 10px; font-size: 14px;">DECRYPTING...</h2>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    </div>

    <script>
        const RICKROLL = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";
        const files = [
            { id: "e1", name: "ENTITY-03181523", url: "ENTITY-03181523.html", restricted: true },
            { id: "e2", name: "ENTITY-180102020904", url: "Entity-180102020904.html", restricted: false },
            { id: "f1", name: "SIGNAL_22", url: RICKROLL },
            { id: "f2", name: "VOID_LOG_A", url: RICKROLL },
            { id: "f3", name: "BIO_SCAN", url: RICKROLL },
            { id: "f4", name: "ENCRYPT_4", url: RICKROLL },
            { id: "f5", name: "SECTOR_7", url: RICKROLL }
        ];

        const grid = document.getElementById('file-grid');
        let pendingUrl = "";

        files.forEach((file) => {
            const div = document.createElement('div');
            div.className = 'file-item';
            if(sessionStorage.getItem(`opened_${file.id}`)) div.classList.add('opened');

            div.innerHTML = `<img src="folder.png" class="file-icon"><div class="file-name">${file.name}</div>`;

            div.onclick = () => {
                if(file.restricted) {
                    pendingUrl = file.url;
                    document.getElementById('passcode-overlay').style.display = 'flex';
                    document.getElementById('file-pass').focus();
                } else {
                    div.classList.add('opened');
                    sessionStorage.setItem(`opened_${file.id}`, 'true');
                    startLoading(file.name, file.url);
                }
            };
            grid.appendChild(div);
        });

        // Passcode logic for Restricted Files
        document.getElementById('file-pass').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                if (this.value.toLowerCase() === "sky") {
                    document.getElementById('passcode-overlay').style.display = 'none';
                    this.value = "";
                    startLoading("RESTRICTED DATA", pendingUrl);
                } else {
                    document.getElementById('pass-msg').innerText = "INVALID KEY";
                    this.value = "";
                }
            }
        });

        function startLoading(name, url) {
            const screen = document.getElementById('loading-screen');
            const fill = document.getElementById('progress-fill');
            document.getElementById('loading-title').innerText = `ACCESSING ${name}...`;
            screen.style.display = 'flex';
            let width = 0;
            let interval = setInterval(() => {
                width += Math.random() * 25;
                if (width >= 100) {
                    clearInterval(interval);
                    window.location.href = url;
                }
                fill.style.width = width + "%";
            }, 120);
        }
    </script>
</body>
</html>
